<!DOCTYPE html>
<html>

<head>

<title>Attendance Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

h1{
margin-top:30px;
}

.dashboard{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.card h3{
margin-bottom:10px;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th{
background:#4CAF50;
color:white;
}

td,th{
padding:10px;
border:1px solid #ddd;
}

tr:nth-child(even){
background:#f2f2f2;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#007BFF;
color:white;
text-decoration:none;
border-radius:5px;
}

.back:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h1>Live Attendance Dashboard</h1>

<div class="dashboard">

<div class="card">
<h3>Current Period</h3>
<p>{{ period }}</p>
</div>

<div class="card">
<h3>Total Attendance Records</h3>
<p>{{ total }}</p>
</div>

</div>

<h2>Attendance Table</h2>

{% for table in tables %}
{{ table|safe }}
{% endfor %}

<a href="/" class="back">Back to Home</a>

</body>
</html>
