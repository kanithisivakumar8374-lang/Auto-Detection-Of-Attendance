<!DOCTYPE html>
<html>
<head>

<title>Auto Detection Of Attendance</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f7fa;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.video{
border:4px solid green;
padding:10px;
}

.panel{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:250px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.attendance{
background:#4CAF50;
color:white;
}

.register{
background:#007BFF;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<h1>Auto Detection Of Attendance</h1>

<div class="container">

<div class="video">
<img src="{{ url_for('video') }}" width="500">
</div>

<div class="panel">

<h3>Attendance Panel</h3>

<a href="/attendance">
<button class="attendance">View Attendance</button>
</a>

<br><br>

<h3>User Registration</h3>

<a href="/register">
<button class="register">Register New User</button>
</a>

</div>

</div>

</body>
</html>
